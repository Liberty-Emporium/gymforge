{% extends "base/owner_base.html" %}
{% block title %}{{ section_title }}{% endblock %}
{% block page_title %}{{ section_title }}{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[50vh] text-center px-6">
  <div class="w-16 h-16 rounded-2xl bg-gray-800 flex items-center justify-center mb-6">
    <svg class="w-8 h-8 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="{{ section_icon }}"/>
    </svg>
  </div>
  <h2 class="text-xl font-bold text-white mb-3">{{ section_title }} Coming Soon</h2>
  <p class="text-gray-400 text-sm max-w-sm leading-relaxed mb-8">{{ description }}</p>
  <a href="/owner/" class="accent-btn px-6 py-2.5 rounded-lg text-sm font-semibold">
    Back to Dashboard
  </a>
</div>
{% endblock %}
